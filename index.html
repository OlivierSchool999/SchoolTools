<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Syne:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0c;
  --surface: #111116;
  --border: rgba(255,255,255,0.07);
  --text: #e8e8ea;
  --muted: rgba(232,232,234,0.35);
  --accent: #c8f542;
  --accent-dim: rgba(200,245,66,0.12);
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
}

/* PARTICLE CANVAS */
#canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
}

/* LAYOUT */
.ui {
  position: relative;
  z-index: 1;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
}

/* DATE */
.date {
  font-family: 'Syne', sans-serif;
  font-weight: 300;
  font-size: 13px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 28px;
}

/* CLOCK DISPLAY */
.clock-wrap {
  display: flex;
  align-items: center;
  gap: 0;
}

.seg {
  font-family: 'DM Mono', monospace;
  font-weight: 300;
  font-size: clamp(72px, 13vw, 160px);
  line-height: 1;
  letter-spacing: -0.03em;
  color: var(--text);
  position: relative;
}

.seg.colon {
  font-size: clamp(48px, 8vw, 100px);
  color: var(--accent);
  padding: 0 4px;
  animation: blink 2s step-start infinite;
}

@keyframes blink {
  0%, 49% { opacity: 1; }
  50%, 100% { opacity: 0.15; }
}

/* TIMEZONE / LABEL */
.label {
  font-family: 'Syne', sans-serif;
  font-weight: 300;
  font-size: 12px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 20px;
  min-height: 16px;
  transition: color 0.3s;
}

/* DIVIDER LINE */
.divider {
  width: 1px;
  height: 40px;
  background: var(--border);
  margin: 32px 0;
}

/* INPUT ROW */
.input-row {
  display: flex;
  align-items: center;
  gap: 0;
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  background: var(--surface);
  transition: border-color 0.2s;
}
.input-row:focus-within {
  border-color: rgba(200,245,66,0.3);
}

#titleInput {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  font-weight: 300;
  letter-spacing: 0.04em;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  padding: 10px 16px;
  width: 220px;
  caret-color: var(--accent);
}
#titleInput::placeholder { color: var(--muted); }

#applyBtn {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  background: var(--accent-dim);
  border: none;
  border-left: 1px solid var(--border);
  color: var(--accent);
  padding: 10px 16px;
  cursor: pointer;
  transition: background 0.2s;
}
#applyBtn:hover { background: rgba(200,245,66,0.2); }

/* CORNER MARKS */
.corner {
  position: fixed;
  width: 18px;
  height: 18px;
  z-index: 2;
  opacity: 0.25;
}
.corner::before, .corner::after {
  content: '';
  position: absolute;
  background: var(--text);
}
.corner::before { width: 1px; height: 100%; }
.corner::after { width: 100%; height: 1px; }
.corner.tl { top: 24px; left: 24px; }
.corner.tr { top: 24px; right: 24px; transform: scaleX(-1); }
.corner.bl { bottom: 24px; left: 24px; transform: scaleY(-1); }
.corner.br { bottom: 24px; right: 24px; transform: scale(-1); }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="ui">
  <div class="date" id="dateEl"></div>

  <div class="clock-wrap">
    <span class="seg" id="h"></span>
    <span class="seg colon">:</span>
    <span class="seg" id="m"></span>
    <span class="seg colon">:</span>
    <span class="seg" id="s"></span>
  </div>

  <div class="label" id="labelEl">set a title below</div>

  <div class="divider"></div>

  <div class="input-row">
    <input id="titleInput" placeholder="custom title or %time%">
    <button id="applyBtn">Apply</button>
  </div>
</div>

<script>
/* ── PARTICLE NETWORK ── */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, pts;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function initPts() {
  const count = Math.floor((W * H) / 14000);
  pts = Array.from({ length: count }, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    vx: (Math.random() - 0.5) * 0.3,
    vy: (Math.random() - 0.5) * 0.3,
    r: Math.random() * 1.5 + 0.5
  }));
}

resize();
initPts();
window.addEventListener('resize', () => { resize(); initPts(); });

function drawNetwork() {
  ctx.clearRect(0, 0, W, H);

  for (let p of pts) {
    p.x += p.vx;
    p.y += p.vy;
    if (p.x < 0 || p.x > W) p.vx *= -1;
    if (p.y < 0 || p.y > H) p.vy *= -1;
  }

  const maxDist = 120;
  for (let i = 0; i < pts.length; i++) {
    for (let j = i + 1; j < pts.length; j++) {
      const dx = pts[i].x - pts[j].x;
      const dy = pts[i].y - pts[j].y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < maxDist) {
        const alpha = (1 - d / maxDist) * 0.18;
        ctx.beginPath();
        ctx.strokeStyle = `rgba(200,245,66,${alpha})`;
        ctx.lineWidth = 0.5;
        ctx.moveTo(pts[i].x, pts[i].y);
        ctx.lineTo(pts[j].x, pts[j].y);
        ctx.stroke();
      }
    }
  }

  for (let p of pts) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(200,245,66,0.35)';
    ctx.fill();
  }

  requestAnimationFrame(drawNetwork);
}
drawNetwork();

/* ── CLOCK ── */
let customTitle = '';

const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function pad(n) { return String(n).padStart(2, '0'); }

function tick() {
  const now = new Date();
  document.getElementById('h').textContent = pad(now.getHours());
  document.getElementById('m').textContent = pad(now.getMinutes());
  document.getElementById('s').textContent = pad(now.getSeconds());

  const dateStr = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
  document.getElementById('dateEl').textContent = dateStr;

  const timeStr = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;

  if (customTitle.includes('%time%')) {
    document.title = customTitle.replace('%time%', timeStr);
  } else if (customTitle) {
    document.title = customTitle;
  } else {
    document.title = timeStr;
  }
}

tick();
setInterval(tick, 1000);

document.getElementById('applyBtn').addEventListener('click', () => {
  customTitle = document.getElementById('titleInput').value.trim();
  const label = document.getElementById('labelEl');
  label.textContent = customTitle || 'set a title below';
  label.style.color = customTitle ? 'var(--accent)' : 'var(--muted)';
  tick();
});

document.getElementById('titleInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('applyBtn').click();
});
</script>
</body>
</html>
